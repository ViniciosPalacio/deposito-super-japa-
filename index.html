<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Super Japa Bebidas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="app-container">
        <h2 class="sr-only">Super Japa Bebidas</h2>
        <div class="header">
            <h1>🍺 Super Japa Bebidas</h1>
            <div class="search-wrap">
                <i class="ti ti-search" aria-hidden="true"></i>
                <input type="text" id="searchBar" placeholder="Pesquisar produto..." oninput="filtrar()">
            </div>
        </div>

        <div class="cats" id="cats"></div>
        <div id="product-list"></div>

        <div id="cart-bar" class="cart-bar hidden">
            <div class="cart-info">
                <div class="cart-items" id="cart-items-count"></div>
                <div class="cart-total" id="cart-total"></div>
            </div>
            <button class="cart-btn" onclick="abrirModal()">
                <i class="ti ti-brand-whatsapp" aria-hidden="true"></i> Pedir pelo Zap
            </button>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden" onclick="fecharModalFora(event)">
        <div class="modal" id="modal">
            <h2>Finalizar pedido</h2>
            <div id="resumo-pedido" class="resumo-box"></div>
            
            <label>Forma de pagamento</label>
            <div class="pay-opts" id="pay-opts">
                <div class="pay-opt" onclick="selPag(this,'Dinheiro')"><i class="ti ti-cash" aria-hidden="true"></i> Dinheiro</div>
                <div class="pay-opt" onclick="selPag(this,'Cartão de débito')"><i class="ti ti-credit-card" aria-hidden="true"></i> Débito</div>
                <div class="pay-opt" onclick="selPag(this,'Cartão de crédito')"><i class="ti ti-credit-card" aria-hidden="true"></i> Crédito</div>
                <div class="pay-opt" onclick="selPag(this,'Pix')"><i class="ti ti-qrcode" aria-hidden="true"></i> Pix</div>
            </div>
            
            <label>Endereço de entrega</label>
            <button class="loc-btn" onclick="pegarLocalizacao()" id="loc-btn">
                <i class="ti ti-current-location"></i> Usar minha localização atual
            </button>
            <div id="loc-status" class="loc-status" style="display:none"></div>
            <input type="text" id="endereco" placeholder="Ou digite o endereço..." style="margin-top:8px">
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
                <button class="btn-send" onclick="enviar()"><i class="ti ti-brand-whatsapp" aria-hidden="true"></i> Enviar pedido</button>
            </div>
        </div>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
